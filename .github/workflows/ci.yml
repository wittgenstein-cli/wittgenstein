name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: Verify (Node + Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format (prettier)
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: polyglot-mini/requirements.txt

      - name: Install Python deps
        run: python -m pip install --upgrade pip && python -m pip install -r polyglot-mini/requirements.txt

      - name: Python compile
        run: python -m compileall polyglot-mini/polyglot

      - name: Python smoke (sensor + image + platform-aware tts)
        env:
          MPLBACKEND: Agg
        run: |
          cd polyglot-mini
          python -m polyglot.cli sensor "synthetic ecg trace for loupe dashboard" --dry-run --out /tmp/ecg.json
          python -m polyglot.cli image "stormy ocean at midnight" --out /tmp/ocean.png
          python -c "import polyglot.tts as t; assert 'en' in t.MAC_VOICES; print('tts module import ok')"
          if command -v say >/dev/null 2>&1; then
            python -m polyglot.cli tts "Hackathon voiceover for the Wittgenstein launch" --out /tmp/voice.m4a
          else
            echo "Skipping runtime TTS smoke on non-macOS runner"
          fi

  static-checks:
    name: Static checks (spelling + workflow + deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typos
        uses: crate-ci/typos@v1

      - name: Actionlint
        uses: reviewdog/action-actionlint@v1

      - name: Dependency review (PR)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        continue-on-error: true
